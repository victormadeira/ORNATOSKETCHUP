      // Re-render current view
      if (currentData) {
        renderContent(currentLevel, currentData);
      } else {
        renderContent('projeto', { total_modulos: 0, modulos: [] });
      }
      // Restore breadcrumb
      var bc = document.getElementById('breadcrumb');
      if (bc && currentLevel === 'projeto') {
        bc.innerHTML = '<span class="bc-current">Projeto</span>';
      }
    }

    function renderBiblioteca() {
      var html = '';

      // Header with back + search
      html += '<div class="lib-header">';
      html += '<button class="lib-back" onclick="closeBiblioteca()" title="Voltar">' + ico('back', 18) + '</button>';
      html += '<input type="text" class="lib-search" id="lib-search" placeholder="Buscar modulo..." value="' + esc(_libSearch) + '" oninput="onLibSearch(this.value)">';
      html += '</div>';

      // Category chips
      html += '<div class="lib-cats">';
      var cats = Object.keys(LIB_CATEGORIES);
      cats.forEach(function(c) {
        var cls = c === _libCat ? 'lib-chip active' : 'lib-chip';
        html += '<button class="' + cls + '" onclick="onLibCat(\'' + c + '\')">' + c + '</button>';
      });
      html += '</div>';

      // Filter modules
      var mods = filterLibModules();

      if (mods.length === 0) {
        html += '<div class="lib-empty">' + ico('search', 32) + '<p style="margin-top:8px">Nenhum modulo encontrado</p></div>';
      } else {
        // Grid
        html += '<div class="lib-grid">';
        mods.forEach(function(m) {
          var sel = _libSelected === m.tipo ? ' selected' : '';
          var isoId = LIB_ISO[m.tipo] || 'iso-inferior';
          html += '<div class="lib-card' + sel + '" onclick="onLibSelect(\'' + m.tipo + '\')">';
          html += '<div class="lib-thumb"><svg width="70" height="50"><use href="#i-' + isoId + '"/></svg></div>';
          html += '<div class="lib-name">' + esc(m.nome) + '</div>';
          html += '<div class="lib-dims">' + m.l + ' x ' + m.p + ' x ' + m.a + ' cm</div>';
          html += '</div>';
        });
        html += '</div>';
      }

      // Inline params (if selected)
      if (_libSelected) {
        html += renderLibParams();
      }

      return html;
    }

    function filterLibModules() {
      var catFilter = LIB_CATEGORIES[_libCat];
      return LIB_MODULES.filter(function(m) {
        // Category filter
        if (catFilter && catFilter.indexOf(m.tipo) === -1) return false;
        // Search filter
        if (_libSearch) {
          var q = _libSearch.toLowerCase();
          return m.nome.toLowerCase().indexOf(q) !== -1 || m.tipo.toLowerCase().indexOf(q) !== -1;
        }
        return true;
      });
    }

    function onLibCat(cat) {
      _libCat = cat;
      refreshLib();
    }

    function onLibSearch(val) {
      _libSearch = val;
      refreshLib();
    }

    function onLibSelect(tipo) {
      if (_libSelected === tipo) {
        _libSelected = null;
        _libW = 0; _libP = 0; _libA = 0;
      } else {
        _libSelected = tipo;
        var m = LIB_MODULES.filter(function(x) { return x.tipo === tipo; })[0];
        if (m) { _libW = m.l; _libP = m.p; _libA = m.a; }
      }
      refreshLib();
      // Scroll to params if selected
      if (_libSelected) {
        setTimeout(function() {
          var p = document.getElementById('lib-params');
          if (p) p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
      }
    }

    function refreshLib() {
      var el = document.getElementById('main-content');
      // Preserve search focus state
      var hadFocus = document.activeElement && document.activeElement.id === 'lib-search';
      var selStart = hadFocus ? document.activeElement.selectionStart : 0;
      el.innerHTML = renderBiblioteca();
      if (hadFocus) {
        var s = document.getElementById('lib-search');
        if (s) { s.focus(); s.selectionStart = s.selectionEnd = selStart; }
      }
    }

    function renderLibParams() {
      if (!_libSelected) return '';
      var m = LIB_MODULES.filter(function(x) { return x.tipo === _libSelected; })[0];
      if (!m) return '';

      var isoId = LIB_ISO[m.tipo] || 'iso-inferior';
      var presets = LIB_PRESETS[m.tipo] || LIB_PRESETS['inferior'] || [60,80,100];

      var html = '<div class="lib-params" id="lib-params">';

      // Title
      html += '<div class="lib-params-title">';
      html += '<div class="lib-sel-icon"><svg width="22" height="22"><use href="#i-' + isoId + '"/></svg></div>';
      html += '<div><h3>' + esc(m.nome) + '</h3>';
      html += '<div class="lib-sel-type">' + esc(m.tipo) + '</div></div></div>';

      // Width presets
      html += '<div style="margin-bottom:8px"><label style="font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Larguras padrao (cm)</label></div>';
      html += '<div class="lib-presets">';
      presets.forEach(function(w) {
        var cls = _libW === w ? 'lib-preset active' : 'lib-preset';
        html += '<button class="' + cls + '" onclick="onLibPreset(' + w + ')">' + w + '</button>';
      });
      html += '</div>';

      // Dimension inputs
      html += '<div class="lib-dim-row">';
      html += '<div class="lib-dim-col"><label>Largura</label><input type="number" id="lib-w" value="' + _libW + '" onchange="onLibDim()" step="1" min="10"><div class="lib-unit">cm</div></div>';
      html += '<div class="lib-dim-col"><label>Profund.</label><input type="number" id="lib-p" value="' + _libP + '" onchange="onLibDim()" step="1" min="10"><div class="lib-unit">cm</div></div>';
      html += '<div class="lib-dim-col"><label>Altura</label><input type="number" id="lib-a" value="' + _libA + '" onchange="onLibDim()" step="1" min="10"><div class="lib-unit">cm</div></div>';
      html += '</div>';

      // Insert button
      html += '<button class="lib-insert-btn" onclick="onLibInsert()">' + ico('place', 20) + ' Inserir no Modelo</button>';

      html += '</div>';
      return html;
    }

    function onLibPreset(w) {
      _libW = w;
      refreshLib();
    }

    function onLibDim() {
      _libW = parseFloat(document.getElementById('lib-w').value) || _libW;
      _libP = parseFloat(document.getElementById('lib-p').value) || _libP;
      _libA = parseFloat(document.getElementById('lib-a').value) || _libA;
    }

    function onLibInsert() {
      if (!_libSelected) return;
      // Read latest dim values
      onLibDim();
      sendAction('create_module', {
        tipo: _libSelected,
        largura: _libW,
        profundidade: _libP,
        altura: _libA
      });
      showToast('Inserindo ' + _libSelected + ' ' + _libW + 'x' + _libP + 'x' + _libA + ' cm...', 'info');
    }

    // ═══ SMART TIPS (marceneiro intelligence) ═══
    function getSmartTip(d) {
      if (!d) return '';
      var tips = [];
      var tipo = d.tipo_sym || d.tipo || '';
      var w = d.largura_mm || 0;
      var h = d.altura_mm || 0;
      var esp = d.espessura_mm || 18;
      var comp = d.composicao || {};

      // Check for wide spans without divisoria
      if (w > 700 && tipo !== 'bancada') {
        var hasDivisoria = (comp.internas || []).some(function(p) { return p.nome && p.nome.toLowerCase().indexOf('divis') !== -1; });
        if (!hasDivisoria) {
          tips.push('Vao livre de ' + w + 'mm. Considere divisoria para vaos > 700mm.');
        }
      }
      // Tall modules need fixacao
      if (h > 1800 && (tipo === 'torre' || tipo === 'torre_quente' || tipo === 'roupeiro' || tipo === 'estante')) {
        tips.push('Modulo alto (' + h + 'mm). Verifique fixacao na parede.');
      }
      // Gavetas profundas
      if ((comp.gavetas || []).length > 0 && (d.profundidade_mm || 0) > 500) {
        tips.push('Gavetas em profundidade ' + d.profundidade_mm + 'mm — verifique corredica full-extension.');
      }
      // Espessura fina para modulos grandes
      if (esp <= 15 && w > 600) {
        tips.push('Espessura ' + esp + 'mm em modulo de ' + w + 'mm. Considere 18mm para maior rigidez.');
      }
      // Many parts = complex
      if ((d.total_pecas || 0) > 15) {
        tips.push('Modulo complexo com ' + d.total_pecas + ' pecas. Verifique sequencia de montagem.');
      }

      if (tips.length === 0) return '';
      var html = '';
      tips.forEach(function(tip) {
        html += '<div class="smart-tip"><span class="smart-tip-icon">' + ico('validate-all', 14) + '</span><span>' + esc(tip) + '</span></div>';
      });
      return html;
    }

    // ═══ MATERIAL COLOR MAP ═══
    var MAT_COLORS = [
      '#D4894A','#5A8DC4','#4A9D6E','#C45454','#8B6BB5','#D49A4A','#6ABFC3','#CC7A8A'
    ];
    var _matColorCache = {};
    function getMaterialColor(mat) {
      if (!mat) return MAT_COLORS[0];
      if (_matColorCache[mat]) return _matColorCache[mat];
      var idx = Object.keys(_matColorCache).length % MAT_COLORS.length;
      _matColorCache[mat] = MAT_COLORS[idx];
      return MAT_COLORS[idx];
    }

    // ═══ MATERIAL BAR (projeto) ═══
    function renderMaterialBar(materiais) {
      if (!materiais || materiais.length === 0) return '';
      var total = materiais.reduce(function(s, m) { return s + parseFloat(m.area_m2 || 0); }, 0);
      if (total === 0) return '';

      var html = '<div class="mat-bar">';
      materiais.forEach(function(m, i) {
        var pct = (parseFloat(m.area_m2 || 0) / total * 100);
        var col = MAT_COLORS[i % MAT_COLORS.length];
        html += '<div class="mat-bar-seg" style="width:' + pct + '%;background:' + col + '"></div>';
      });
      html += '</div>';

      html += '<div class="mat-legend">';
      materiais.forEach(function(m, i) {
        var col = MAT_COLORS[i % MAT_COLORS.length];
        _matColorCache[m.nome] = col;
        html += '<div class="mat-legend-item">';
        html += '<div class="mat-legend-dot" style="background:' + col + '"></div>';
        html += '<span>' + esc(m.nome) + '</span>';
        html += '<span class="mat-legend-val">' + m.area_m2 + ' m²</span>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    // ═══ RESUMO DE CORTE (marceneiro) ═══
    function renderCutSummary(d) {
      if (!d || !d.composicao) return '';
      var comp = d.composicao;
      var nEst = (comp.estruturais || []).length;
      var nFront = (comp.frontais || []).length;
      var nInt = (comp.internas || []).length;
      var nGav = (comp.gavetas || []).length;
      var totalPecas = nEst + nFront + nInt + nGav;

      var html = '<div class="card"><div class="card-header"><h3>Resumo de Corte</h3></div>';
      html += '<div class="cut-summary">';
      html += '<div class="cut-stat"><div class="cut-stat-value">' + totalPecas + '</div><div class="cut-stat-label">Pecas MDF</div></div>';
      html += '<div class="cut-stat"><div class="cut-stat-value">' + (d.area_m2 || 0) + '</div><div class="cut-stat-label">Area m²</div><div class="cut-stat-sub">' + d.espessura_mm + 'mm</div></div>';
      html += '<div class="cut-stat"><div class="cut-stat-value">' + (d.fita_metros || 0) + '</div><div class="cut-stat-label">Fita metros</div></div>';
      html += '<div class="cut-stat"><div class="cut-stat-value">' + (comp.ferragens || []).length + '</div><div class="cut-stat-label">Ferragens</div></div>';
      html += '</div></div>';
      return html;
    }

    // ═══ COMPOSICAO DETALHADA (com dims, icones e codigos) ═══
    var _pieceCounter = 0;
    function renderComposicaoDetalhada(comp) {
      if (!comp) return '';
      var html = '';
      _pieceCounter = 0;

      function addGroup(items, groupLabel, badge, cls, iconId) {
        if (!items || !items.length) return;
        html += '<div class="comp-group-label"><span>' + groupLabel + ' (' + items.length + ')</span><span class="comp-line"></span></div>';
        items.forEach(function(p) {
          _pieceCounter++;
          var pieceCode = String(_pieceCounter).padStart(2, '0');
          html += '<div class="comp-item" onclick="selectEntity(' + p.entity_id + ')">';
          html += '<div class="comp-item-left">';
          html += '<span class="comp-item-code">' + pieceCode + '</span>';
          html += '<div class="comp-item-icon" style="background:' + badgeBg(cls) + ';color:' + badgeColor(cls) + '">' + ico(iconId, 14) + '</div>';
          html += '<div class="comp-item-info"><div class="comp-item-name">' + esc(p.nome) + '</div>';
          if (p.dims) html += '<div class="comp-item-dims">' + esc(p.dims) + '</div>';
          html += '</div></div>';
          html += '<div class="comp-item-right"><span class="item-badge ' + cls + '">' + badge + '</span></div>';
          html += '</div>';
        });
      }

      addGroup(comp.estruturais, 'Estruturais', 'EST', 'badge-struct', 'inferior');
      addGroup(comp.frontais, 'Frontais', 'FRONT', 'badge-front', 'porta');
      addGroup(comp.internas, 'Internas', 'INT', 'badge-intern', 'prateleira');
      addGroup(comp.gavetas, 'Gavetas', 'GAV', 'badge-drawer', 'gaveta');

      return html;
    }

    function badgeBg(cls) {
      var map = {'badge-struct':'var(--badge-struct-bg)','badge-front':'var(--badge-front-bg)','badge-intern':'var(--badge-intern-bg)','badge-drawer':'var(--badge-drawer-bg)','badge-hw':'var(--badge-hw-bg)'};
      return map[cls] || 'var(--bg-badge)';
    }
    function badgeColor(cls) {
      var map = {'badge-struct':'var(--badge-struct)','badge-front':'var(--badge-front)','badge-intern':'var(--badge-intern)','badge-drawer':'var(--badge-drawer)','badge-hw':'var(--badge-hw)'};
      return map[cls] || 'var(--text-muted)';
    }

    // ═══ FERRAGENS RESUMO AGRUPADO ═══
    function renderHardwareSummary(ferragens) {
      if (!ferragens || ferragens.length === 0) return '';
      var html = '<div class="hw-summary">';
      ferragens.forEach(function(hw) {
        // Parse qty from name like "4x Dobradica Reta"
        var match = hw.nome.match(/^(\d+)x?\s+(.+)/i);
        var qty = match ? match[1] : '1';
        var label = match ? match[2] : hw.nome;
        var hwIcon = guessHwIcon(label);

        html += '<div class="hw-item">';
        html += '<div class="hw-item-icon">' + ico(hwIcon, 16) + '</div>';
        html += '<div class="hw-item-info"><div class="hw-item-qty">' + qty + 'x</div>';
        html += '<div class="hw-item-label">' + esc(label) + '</div></div>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }

    function guessEspType(esp) {
      if (esp <= 3) return 'Laminado / HDF';
      if (esp <= 6) return 'HDF / Fundo';
      if (esp <= 9) return 'MDF Fino';
      if (esp <= 15) return 'MDF Standard';
      if (esp <= 18) return 'MDF / MDP';
      if (esp <= 25) return 'MDF Grosso';
      return 'Chapa Especial';
    }

    function guessHwIcon(label) {
      var l = (label || '').toLowerCase();
      if (l.indexOf('corredica') !== -1) return 'corredica';
      if (l.indexOf('dobradica') !== -1) return 'dobradica';
      if (l.indexOf('avento') !== -1) return 'basculante';
      if (l.indexOf('puxador') !== -1) return 'porta';
      if (l.indexOf('minifix') !== -1) return 'fixacao';
      if (l.indexOf('pe') !== -1 || l.indexOf('rodizio') !== -1) return 'pe';
      return 'gear';
    }

    // ═══ [1] VISTA ESQUEMATICA DO MODULO ═══
    function renderSchematic(d) {
      if (!d || !d.composicao) return '';
      var comp = d.composicao;
      var W = 320, H = 180;
      var mw = 160, mh = 110; // module rect
      var mx = (W - mw) / 2, my = 30;
      var esp = 4; // thickness visual

      var svg = '<div class="schematic-view">';
      svg += '<svg class="schematic-svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">';

      // Dimension lines
      // Width (top)
      svg += '<line x1="' + mx + '" y1="18" x2="' + (mx+mw) + '" y2="18" class="schematic-dimline"/>';
      svg += '<line x1="' + mx + '" y1="14" x2="' + mx + '" y2="22" class="schematic-dimline"/>';
      svg += '<line x1="' + (mx+mw) + '" y1="14" x2="' + (mx+mw) + '" y2="22" class="schematic-dimline"/>';
      svg += '<text x="' + (mx+mw/2) + '" y="13" class="schematic-dim">' + (d.largura_mm || 0) + '</text>';
      // Height (right)
      var rx = mx + mw + 10;
      svg += '<line x1="' + rx + '" y1="' + my + '" x2="' + rx + '" y2="' + (my+mh) + '" class="schematic-dimline"/>';
      svg += '<line x1="' + (rx-4) + '" y1="' + my + '" x2="' + (rx+4) + '" y2="' + my + '" class="schematic-dimline"/>';
      svg += '<line x1="' + (rx-4) + '" y1="' + (my+mh) + '" x2="' + (rx+4) + '" y2="' + (my+mh) + '" class="schematic-dimline"/>';
      svg += '<text x="' + (rx+12) + '" y="' + (my+mh/2+3) + '" class="schematic-dim" text-anchor="middle" writing-mode="tb">' + (d.altura_mm || 0) + '</text>';

      // Base structure: left, right, top, bottom
      // Left lateral
      var eid = getCompEntityId(comp.estruturais, 'lateral_esq', 0);
      svg += '<rect x="' + mx + '" y="' + my + '" width="' + esp + '" height="' + mh + '" class="schematic-part schematic-part-struct" stroke-width="1.2" rx="1" onclick="selectEntity(' + eid + ')"/>';
      svg += '<text x="' + (mx - 6) + '" y="' + (my + mh/2) + '" class="schematic-label" text-anchor="end" onclick="selectEntity(' + eid + ')">LAT.E</text>';

      // Right lateral
      eid = getCompEntityId(comp.estruturais, 'lateral_dir', 1);
      svg += '<rect x="' + (mx+mw-esp) + '" y="' + my + '" width="' + esp + '" height="' + mh + '" class="schematic-part schematic-part-struct" stroke-width="1.2" rx="1" onclick="selectEntity(' + eid + ')"/>';
      svg += '<text x="' + (mx+mw+6) + '" y="' + (my + mh/2) + '" class="schematic-label" text-anchor="start" onclick="selectEntity(' + eid + ')">LAT.D</text>';

      // Top
      eid = getCompEntityId(comp.estruturais, 'tampo', 2);
      svg += '<rect x="' + mx + '" y="' + my + '" width="' + mw + '" height="' + esp + '" class="schematic-part schematic-part-struct" stroke-width="1.2" rx="1" onclick="selectEntity(' + eid + ')"/>';
      svg += '<text x="' + (mx+mw/2) + '" y="' + (my - 4) + '" class="schematic-label" onclick="selectEntity(' + eid + ')">TAMPO</text>';

      // Bottom / base
      eid = getCompEntityId(comp.estruturais, 'base', 3);
      svg += '<rect x="' + mx + '" y="' + (my+mh-esp) + '" width="' + mw + '" height="' + esp + '" class="schematic-part schematic-part-struct" stroke-width="1.2" rx="1" onclick="selectEntity(' + eid + ')"/>';
      svg += '<text x="' + (mx+mw/2) + '" y="' + (my+mh+14) + '" class="schematic-label" onclick="selectEntity(' + eid + ')">BASE</text>';

      // Back panel (dashed)
      eid = getCompEntityId(comp.estruturais, 'fundo', 4);
      svg += '<rect x="' + (mx+esp+2) + '" y="' + (my+esp+2) + '" width="' + (mw-2*esp-4) + '" height="' + (mh-2*esp-4) + '" fill="none" stroke="var(--text-muted)" stroke-width="0.8" stroke-dasharray="4 3" rx="2" opacity="0.4" class="schematic-part" onclick="selectEntity(' + eid + ')"/>';
      svg += '<text x="' + (mx+mw/2) + '" y="' + (my + mh/2 - 20) + '" class="schematic-dim" opacity="0.4">FUNDO</text>';
      // Depth cota (below base)
      var depthY = my + mh + 28;
      svg += '<text x="' + (mx+mw/2) + '" y="' + (depthY) + '" class="schematic-dim" style="font-size:7px;opacity:0.5">prof. ' + (d.profundidade_mm || 0) + '</text>';

      // Shelves (internas)
      if (comp.internas && comp.internas.length > 0) {
        var shelves = comp.internas.filter(function(p) { return p.nome && p.nome.toLowerCase().indexOf('prat') !== -1; });
        var nShelves = shelves.length || 0;
        if (nShelves > 0) {
          var spacing = (mh - 2*esp) / (nShelves + 1);
          for (var i = 0; i < nShelves; i++) {
            var sy = my + esp + spacing * (i + 1);
            var seid = shelves[i] ? shelves[i].entity_id : 0;
            svg += '<rect x="' + (mx+esp) + '" y="' + (sy-1) + '" width="' + (mw-2*esp) + '" height="2" class="schematic-part schematic-part-intern" stroke-width="0.8" rx="0.5" onclick="selectEntity(' + seid + ')"/>';
          }
        }
      }

      // Doors (frontais)
      if (comp.frontais && comp.frontais.length > 0) {
        var nDoors = comp.frontais.length;
        var doorW = (mw - 2*esp - (nDoors-1)*3) / nDoors;
        for (var i = 0; i < nDoors; i++) {
          var dx = mx + esp + i * (doorW + 3);
          var deid = comp.frontais[i].entity_id || 0;
          svg += '<rect x="' + dx + '" y="' + (my+esp) + '" width="' + doorW + '" height="' + (mh-2*esp) + '" class="schematic-part schematic-part-front" stroke-width="1" rx="2" fill-opacity="0.3" onclick="selectEntity(' + deid + ')"/>';
          // Handle dot
          var handleX = dx + doorW - 6;
          var handleY = my + mh/2;
          svg += '<circle cx="' + handleX + '" cy="' + handleY + '" r="2" fill="var(--badge-front)" opacity="0.6"/>';
        }
      }

      // Drawers (gavetas)
      if (comp.gavetas && comp.gavetas.length > 0) {
        var nDraw = comp.gavetas.length;
        var drawH = (mh - 2*esp - (nDraw-1)*3) / nDraw;
        for (var i = 0; i < nDraw; i++) {
          var dy = my + esp + i * (drawH + 3);
          var geid = comp.gavetas[i].entity_id || 0;
          svg += '<rect x="' + (mx+esp) + '" y="' + dy + '" width="' + (mw-2*esp) + '" height="' + drawH + '" class="schematic-part schematic-part-drawer" stroke-width="1" rx="2" fill-opacity="0.3" onclick="selectEntity(' + geid + ')"/>';
          // Handle line
          svg += '<line x1="' + (mx+mw/2-10) + '" y1="' + (dy+drawH/2) + '" x2="' + (mx+mw/2+10) + '" y2="' + (dy+drawH/2) + '" stroke="var(--badge-drawer)" stroke-width="1.5" stroke-linecap="round"/>';
        }
      }

      svg += '</svg>';
      svg += '<div style="text-align:center;font-size:9px;color:var(--text-muted);margin-top:4px">Clique nas pecas para selecionar</div>';
      svg += '</div>';
      return svg;
    }

    function getCompEntityId(arr, hint, fallbackIdx) {
      if (!arr || arr.length === 0) return 0;
      // Try to find by name hint
      for (var i = 0; i < arr.length; i++) {
        if (arr[i].nome && arr[i].nome.toLowerCase().indexOf(hint) !== -1) return arr[i].entity_id || 0;
      }
      // Fallback by index
      if (arr[fallbackIdx]) return arr[fallbackIdx].entity_id || 0;
      if (arr[0]) return arr[0].entity_id || 0;
      return 0;
    }

    // ═══ [2] DIAGRAMA PROPORCIONAL DA PECA ═══
    function renderPieceDiagram(d) {
      if (!d) return '';
      var comp = d.comp_mm || 600;
      var larg = d.larg_mm || 300;
      var b = d.bordas || {};

      // Calculate proportional size (max 280px wide)
      var maxW = 260, maxH = 120;
      var ratio = comp / larg;
      var pw, ph;
      if (ratio > maxW / maxH) { pw = maxW; ph = Math.max(40, pw / ratio); }
      else { ph = maxH; pw = Math.max(60, ph * ratio); }

      var padX = 40, padY = 30;
      var svgW = pw + padX * 2;
      var svgH = ph + padY * 2;

      var html = '<div class="piece-diagram">';
      html += '<svg class="piece-svg" width="' + svgW + '" height="' + svgH + '" viewBox="0 0 ' + svgW + ' ' + svgH + '">';

      // Piece body
      html += '<rect x="' + padX + '" y="' + padY + '" width="' + pw + '" height="' + ph + '" class="piece-body" rx="2"/>';

      // Edges with borda colors
      var edgeW = 3;
      // Top (frontal)
      html += '<line x1="' + padX + '" y1="' + padY + '" x2="' + (padX+pw) + '" y2="' + padY + '" class="piece-edge ' + (b.frontal ? 'piece-edge-active' : 'piece-edge-inactive') + '"/>';
      // Bottom (traseira)
      html += '<line x1="' + padX + '" y1="' + (padY+ph) + '" x2="' + (padX+pw) + '" y2="' + (padY+ph) + '" class="piece-edge ' + (b.traseira ? 'piece-edge-active' : 'piece-edge-inactive') + '"/>';
      // Left (esquerda)
      html += '<line x1="' + padX + '" y1="' + padY + '" x2="' + padX + '" y2="' + (padY+ph) + '" class="piece-edge ' + (b.esquerda ? 'piece-edge-active' : 'piece-edge-inactive') + '"/>';
      // Right (direita)
      html += '<line x1="' + (padX+pw) + '" y1="' + padY + '" x2="' + (padX+pw) + '" y2="' + (padY+ph) + '" class="piece-edge ' + (b.direita ? 'piece-edge-active' : 'piece-edge-inactive') + '"/>';

      // Edge labels
      if (b.frontal) html += '<text x="' + (padX+pw/2) + '" y="' + (padY-8) + '" class="piece-cota" style="font-size:8px;fill:var(--orn-primary)">F</text>';
      if (b.traseira) html += '<text x="' + (padX+pw/2) + '" y="' + (padY+ph+14) + '" class="piece-cota" style="font-size:8px;fill:var(--orn-primary)">T</text>';
      if (b.esquerda) html += '<text x="' + (padX-10) + '" y="' + (padY+ph/2+3) + '" class="piece-cota" style="font-size:8px;fill:var(--orn-primary)">E</text>';
      if (b.direita) html += '<text x="' + (padX+pw+10) + '" y="' + (padY+ph/2+3) + '" class="piece-cota" style="font-size:8px;fill:var(--orn-primary)">D</text>';

      // Width cota (top)
      var cotaY = padY - 18;
      html += '<line x1="' + padX + '" y1="' + cotaY + '" x2="' + (padX+pw) + '" y2="' + cotaY + '" class="piece-cota-line"/>';
      html += '<line x1="' + padX + '" y1="' + (cotaY-3) + '" x2="' + padX + '" y2="' + (cotaY+3) + '" class="piece-cota-line"/>';
      html += '<line x1="' + (padX+pw) + '" y1="' + (cotaY-3) + '" x2="' + (padX+pw) + '" y2="' + (cotaY+3) + '" class="piece-cota-line"/>';
      html += '<text x="' + (padX+pw/2) + '" y="' + (cotaY-4) + '" class="piece-cota">' + round1(comp) + '</text>';

      // Height cota (left)
      var cotaX = padX - 22;
      html += '<line x1="' + cotaX + '" y1="' + padY + '" x2="' + cotaX + '" y2="' + (padY+ph) + '" class="piece-cota-line"/>';
      html += '<line x1="' + (cotaX-3) + '" y1="' + padY + '" x2="' + (cotaX+3) + '" y2="' + padY + '" class="piece-cota-line"/>';
      html += '<line x1="' + (cotaX-3) + '" y1="' + (padY+ph) + '" x2="' + (cotaX+3) + '" y2="' + (padY+ph) + '" class="piece-cota-line"/>';
      html += '<text x="' + cotaX + '" y="' + (padY+ph/2) + '" class="piece-cota" transform="rotate(-90,' + cotaX + ',' + (padY+ph/2) + ')">' + round1(larg) + '</text>';

      // Grain direction arrow
      if (d.grao && d.grao !== 'nenhum') {
        var cx = padX + pw / 2;
        var cy = padY + ph / 2;
        if (d.grao === 'comprimento' || d.grao === 'horizontal') {
          html += '<line x1="' + (cx-15) + '" y1="' + cy + '" x2="' + (cx+15) + '" y2="' + cy + '" class="piece-grain-arrow" marker-end="url(#arrowGrain)"/>';
          html += '<text x="' + cx + '" y="' + (cy+12) + '" class="piece-grain-label">GRAO</text>';
        } else {
          html += '<line x1="' + cx + '" y1="' + (cy-15) + '" x2="' + cx + '" y2="' + (cy+15) + '" class="piece-grain-arrow" marker-end="url(#arrowGrain)"/>';
          html += '<text x="' + (cx+14) + '" y="' + cy + '" class="piece-grain-label">GRAO</text>';
        }
      }

      // Arrow marker def
      html += '<defs><marker id="arrowGrain" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="var(--text-muted)" stroke-width="0.8"/></marker></defs>';

      html += '</svg></div>';
      return html;
    }

    // ═══ [3] CNC FACE MINI-MAP ═══
    function renderCncFaceMap(d) {
      if (!d || !d.operacoes || d.operacoes.length === 0) return '';

      // Group operations by face
      var faces = {};
      d.operacoes.forEach(function(op) {
        var face = op.face || 'frente';
        if (!faces[face]) faces[face] = [];
        faces[face].push(op);
      });

      var faceKeys = Object.keys(faces);
      if (faceKeys.length === 0) return '';

      var comp = d.comp_mm || 600;
      var larg = d.larg_mm || 300;
      var faceW = 120, faceH = 70;

      var html = '<div class="cnc-facemap">';
      faceKeys.forEach(function(face) {
        html += '<div class="cnc-face">';
        html += '<div class="cnc-face-title">' + esc(face) + '</div>';
        html += '<svg width="' + faceW + '" height="' + faceH + '" viewBox="0 0 ' + faceW + ' ' + faceH + '">';

        // Face outline
        html += '<rect x="5" y="5" width="' + (faceW-10) + '" height="' + (faceH-10) + '" fill="var(--bg-input)" stroke="var(--border)" stroke-width="0.8" rx="2"/>';

        // Plot operations
        faces[face].forEach(function(op) {
          // Map position to face rect
          var x = 5 + ((op.pos_x || 0) / comp) * (faceW - 10);
          var y = 5 + ((op.pos_y || 0) / larg) * (faceH - 10);
          // Clamp
          x = Math.max(8, Math.min(faceW - 8, x));
          y = Math.max(8, Math.min(faceH - 8, y));

          var dotClass = 'cnc-dot-furo';
          var r = 3;
          var sub = (op.subtipo || '').toLowerCase();
          if (sub.indexOf('cavilha') !== -1) { dotClass = 'cnc-dot-cavilha'; r = 2.5; }
          else if (sub.indexOf('minifix') !== -1 || sub.indexOf('excent') !== -1) { dotClass = 'cnc-dot-minifix'; r = 3.5; }
          else if (sub.indexOf('rasgo') !== -1 || sub.indexOf('canal') !== -1) { dotClass = 'cnc-dot-rasgos'; r = 2; }

          html += '<circle cx="' + round1(x) + '" cy="' + round1(y) + '" r="' + r + '" class="' + dotClass + '" opacity="0.8">';
          html += '<title>' + esc(op.nome) + ' (' + round1(op.pos_x||0) + ', ' + round1(op.pos_y||0) + ')</title></circle>';
        });

        html += '</svg></div>';
      });
      html += '</div>';

      // Legend
      html += '<div class="cnc-legend">';
      html += '<div class="cnc-legend-item"><div class="cnc-legend-dot" style="background:var(--error)"></div>Furo</div>';
      html += '<div class="cnc-legend-item"><div class="cnc-legend-dot" style="background:var(--warning)"></div>Cavilha</div>';
      html += '<div class="cnc-legend-item"><div class="cnc-legend-dot" style="background:var(--info)"></div>Minifix</div>';
      html += '<div class="cnc-legend-item"><div class="cnc-legend-dot" style="background:var(--badge-hw)"></div>Rasgo</div>';
      html += '</div>';

      return html;
    }

    // ═══ [4] WIDTH PRESET APPLY ═══
    function applyWidthPreset(wmm) {
      var el = document.getElementById('dim-w');
      if (el) {
        el.value = wmm;
        onDimChange();
      }
    }

    // ═══ DETALHAR — LEGENDA COMPLETA DO MODULO ═══
    var _detalharData = null;
    function showDetalhar() {
      if (!_detalharData) return;
      var el = document.getElementById('main-content');
      el.className = 'content fade-in';
      el.innerHTML = renderDetalhar(_detalharData);
    }

    function renderDetalhar(d) {
      if (!d || !d.composicao) return emptyState('Sem dados de composicao');
      var comp = d.composicao;
      var modCode = d._code || 'M00';
      var html = '';

      // Header
      html += '<div class="card">';
      html += '<div class="detalhar-header">';
      html += '<div class="mod-code-lg">' + modCode + '</div>';
      html += '<div class="mod-name-lg">' + esc(d.nome) + '</div>';
      html += '</div>';
      html += '<div class="detalhar-summary">';
      html += '<div>Tipo: <span>' + esc(d.tipo) + '</span></div>';
      html += '<div>Material: <span>' + esc(d.material) + '</span></div>';
      html += '<div>Dims: <span>' + (d.largura_mm||0) + ' × ' + (d.profundidade_mm||0) + ' × ' + (d.altura_mm||0) + '</span></div>';
      html += '</div>';

      // Piece legend table
      html += '<div style="overflow-x:auto">';
      html += '<table class="detalhar-table">';
      html += '<thead><tr>';
      html += '<th>#</th><th>Peca</th><th>Tipo</th><th>Comp × Larg × Esp</th><th>Bordas</th>';
      html += '</tr></thead><tbody>';

      var pieceNum = 0;
      function addRows(items, tipo) {
        if (!items || !items.length) return;
        items.forEach(function(p) {
          pieceNum++;
          var code = String(pieceNum).padStart(2, '0');
          var dims = p.dims || '-';
          // Parse borda info from dims or default
          var bordaStr = '-';
          if (p.bordas) {
            bordaStr = '';
            bordaStr += '<span class="' + (p.bordas.frontal ? 'borda-yes' : 'borda-no') + '">F</span> ';
            bordaStr += '<span class="' + (p.bordas.traseira ? 'borda-yes' : 'borda-no') + '">T</span> ';
            bordaStr += '<span class="' + (p.bordas.esquerda ? 'borda-yes' : 'borda-no') + '">E</span> ';
            bordaStr += '<span class="' + (p.bordas.direita ? 'borda-yes' : 'borda-no') + '">D</span>';
          } else {
            // Estimate bordas based on piece type
            bordaStr = guessBordas(p.nome, tipo);
          }
          html += '<tr onclick="selectEntity(' + p.entity_id + ')" style="cursor:pointer">';
          html += '<td class="td-code">' + code + '</td>';
          html += '<td class="td-name">' + esc(p.nome) + '</td>';
          html += '<td class="td-type">' + tipo + '</td>';
          html += '<td class="td-dims">' + esc(dims) + '</td>';
          html += '<td class="td-borda">' + bordaStr + '</td>';
          html += '</tr>';
        });
      }

      addRows(comp.estruturais, 'EST');
      addRows(comp.frontais, 'FRONT');
      addRows(comp.internas, 'INT');
      addRows(comp.gavetas, 'GAV');

      html += '</tbody></table></div>';

      // Ferragens summary below
      if (comp.ferragens && comp.ferragens.length > 0) {
        html += '<div style="margin-top:10px;font-size:10px;color:var(--text-muted)">';
        html += '<strong>Ferragens:</strong> ';
        html += comp.ferragens.map(function(hw) { return esc(hw.nome); }).join(' · ');
        html += '</div>';
      }

      html += '</div>';

      // Back button
      html += '<button class="btn btn-secondary" style="margin-top:8px" onclick="navigateTo(' + (d.entity_id||0) + ',\'modulo\')">' + ico('back',14) + ' Voltar ao Modulo</button>';

      return html;
    }

    function guessBordas(nome, tipo) {
      var n = (nome || '').toLowerCase();
      if (tipo === 'FRONT') {
        return '<span class="borda-yes">F</span> <span class="borda-yes">T</span> <span class="borda-yes">E</span> <span class="borda-yes">D</span>';
      }
      if (n.indexOf('fundo') !== -1) {
        return '<span class="borda-no">F</span> <span class="borda-no">T</span> <span class="borda-no">E</span> <span class="borda-no">D</span>';
      }
      if (n.indexOf('lateral') !== -1) {
        return '<span class="borda-yes">F</span> <span class="borda-no">T</span> <span class="borda-no">E</span> <span class="borda-no">D</span>';
      }
      if (n.indexOf('base') !== -1 || n.indexOf('topo') !== -1) {
        return '<span class="borda-yes">F</span> <span class="borda-no">T</span> <span class="borda-no">E</span> <span class="borda-no">D</span>';
      }
      if (n.indexOf('pratel') !== -1) {
        return '<span class="borda-yes">F</span> <span class="borda-no">T</span> <span class="borda-no">E</span> <span class="borda-no">D</span>';
      }
      return '<span class="borda-yes">F</span> <span class="borda-no">T</span> <span class="borda-no">E</span> <span class="borda-no">D</span>';
    }

    // ── Comunicacao com Ruby ──
    function navigateTo(entityId, nivel) {
      if (nivel === 'projeto') { sketchup.ornato_navigate('0'); return; }
      if (entityId) sketchup.ornato_navigate('' + entityId);
    }
    function selectEntity(entityId) {
      if (entityId) sketchup.ornato_select_entity('' + entityId);
    }
    function sendAction(action, payload) {
      sketchup.ornato_action(JSON.stringify({ action: action, payload: payload }));
    }

    // ── Utilitarios ──
    function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') : ''; }
    function round1(v) { return v ? Math.round(v * 10) / 10 : 0; }
    function ico(id, size) { size = size || 16; return '<svg width="'+size+'" height="'+size+'" style="vertical-align:middle;flex-shrink:0"><use href="#i-'+id+'"/></svg>'; }

    function showToast(msg, type) {
      var container = document.getElementById('toasts');
      var t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.innerHTML = esc(msg);
      container.appendChild(t);
      setTimeout(function() { t.remove(); }, 3500);
    }

    // ── Dark Mode ──
    function toggleDark() {
      document.body.classList.toggle('dark');
      try { localStorage.setItem('ornato_dark', document.body.classList.contains('dark') ? '1' : '0'); } catch(e) {}
    }
    try { if (localStorage.getItem('ornato_dark') === '1') document.body.classList.add('dark'); } catch(e) {}

    // ── Atalhos de teclado ──
    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'v' || e.key === 'V') {
        if (currentLevel === 'modulo') sendAction('validate_module', {});
        else if (currentLevel === 'projeto') sendAction('validate_all', {});
      }
      if (e.key === 'e' || e.key === 'E') sendAction('export_project', {});
      if (e.key === 'Escape') { if (_libSelected !== null || document.querySelector('.lib-header')) { closeBiblioteca(); return; } navigateTo(0, 'projeto'); }
      if ((e.key === 'n' || e.key === 'N') && currentLevel === 'projeto') { showBiblioteca(); return; }
      if (currentLevel === 'modulo') {
        if (e.key === 't' || e.key === 'T') { showDetalhar(); e.preventDefault(); return; }
        if (e.key === 'w' || e.key === 'W') { var el = document.getElementById('dim-w'); if(el){el.focus();el.select();e.preventDefault();} }
        if (e.key === 'h' || e.key === 'H') { var el = document.getElementById('dim-h'); if(el){el.focus();el.select();e.preventDefault();} }
        if (e.key === 'd' || e.key === 'D') { var el = document.getElementById('dim-d'); if(el){el.focus();el.select();e.preventDefault();} }
      }
    });

    // ── Boot: notificar Ruby que JS esta pronto ──
    try { sketchup.ornato_ready(); } catch(e) {
      // Rodando fora do SketchUp (preview) — carregar mock data
      console.log('ORNATO Panel: rodando em modo preview (fora do SketchUp)');
    }
  </script>
</body>
</html>
